<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Specter — Dashboard</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <header class="dashboard-nav">
    <span class="dashboard-logo">SPECTER</span>
  </header>
  <main class="dashboard-grid">
    <aside class="panel panel-feed">
      <div class="panel-header">LIVE FEED</div>
      <div class="panel-content"></div>
    </aside>
    <section class="panel panel-main">
      <div class="panel-header">SITE SUMMARY</div>
      <div class="panel-content"></div>
    </section>
    <aside class="panel panel-detail panel-detail--collapsed">
      <div class="panel-header">DETAIL</div>
      <div class="panel-content"></div>
    </aside>
  </main>
</body>
</html>
