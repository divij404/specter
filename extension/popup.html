<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Specter</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="popup-header">
    <img src="icons/brand/logo.svg" alt="" class="specter-logo specter-logo--popup">
    <span class="popup-title">SPECTER</span>
    <span class="popup-header-spacer"></span>
    <span class="popup-status-pill" id="status-pill" data-state="stopped">
      <span class="popup-status-dot" id="status-dot"></span>
      <span class="popup-status-label" id="status-label">STOPPED</span>
    </span>
  </header>

  <div class="popup-body">
    <div class="popup-meta-row">
      <span class="popup-site-name" id="current-site">—</span>
      <span class="popup-timer" id="timer" aria-live="polite"></span>
    </div>

    <div class="popup-score-block">
      <div class="popup-score-display">
        <span class="popup-score-number" id="privacy-score">—</span>
        <span class="popup-score-denom">/100</span>
      </div>
      <span class="popup-score-label">PRIVACY SCORE</span>
    </div>

    <div class="popup-stats-row">
      <span class="popup-tracker-count" id="tracker-count">—</span>
    </div>
  </div>

  <div class="popup-actions" id="popup-actions">
    <!-- rendered by JS based on state -->
  </div>

  <div class="popup-footer">
    <a id="open-dashboard" class="popup-footer-btn" href="" role="button">Open Dashboard ↗</a>
    <button type="button" id="btn-copy-report" class="popup-footer-btn">Copy Report</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
